version: "3.9"

services:
  # ── PostgreSQL + TimescaleDB ─────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: market-analyzer-db
    environment:
      POSTGRES_DB: market_analyzer
      POSTGRES_USER: analyzer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyzer -d market_analyzer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Cache + Celery Broker) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: market-analyzer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Application ──────────────────────────────
  app:
    build: .
    container_name: market-analyzer-app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://analyzer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/market_analyzer
      - REDIS_URL=redis://redis:6379/0
      - FINBERT_SERVICE_URL=http://finbert:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Celery Worker ────────────────────────────────────
  celery_worker:
    build: .
    container_name: market-analyzer-worker
    command: celery -A src.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://analyzer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/market_analyzer
      - REDIS_URL=redis://redis:6379/0
      - FINBERT_SERVICE_URL=http://finbert:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (Scheduler) ──────────────────────────
  celery_beat:
    build: .
    container_name: market-analyzer-beat
    command: celery -A src.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://analyzer:${POSTGRES_PASSWORD:-changeme}@postgres:5432/market_analyzer
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Flower (Task Monitor) ─────────────────────
  flower:
    build: .
    container_name: market-analyzer-flower
    command: celery -A src.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── FinBERT Microservice ─────────────────────────────
  finbert:
    build: ./services/finbert
    container_name: market-analyzer-finbert
    ports:
      - "8001:8001"
    volumes:
      - finbert_models:/models
    environment:
      - MODEL_CACHE_DIR=/models
      - WORKERS=2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Prometheus ───────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: market-analyzer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: market-analyzer-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Nginx (Reverse Proxy) ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: market-analyzer-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  finbert_models:
  prometheus_data:
  grafana_data:
