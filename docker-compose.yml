version: "3.9"

services:
  app:
    build: .
    container_name: market-analyzer
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # SQLite DB persistence
      - ./frontend:/app/frontend  # Hot-reload frontend
      - ./.env:/app/.env          # Environment
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

