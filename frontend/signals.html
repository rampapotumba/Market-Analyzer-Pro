<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Analyzer Pro — Signal History</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
<div class="app-layout">

    <!-- Header -->
    <header class="app-header">
        <div class="app-logo">📈 <span>Market Analyzer Pro</span></div>
        <nav class="header-nav">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/signals" class="nav-link active">Signals</a>
            <a href="/accuracy" class="nav-link">Accuracy</a>
        </nav>
        <div class="header-status">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-label" id="statusLabel">Live</span>
        </div>
    </header>

    <!-- No Sidebar on Signals Page -->
    <div style="background: var(--bg-secondary); border-right: 1px solid var(--border);">
        <!-- Filters sidebar -->
        <div style="padding: 16px;">
            <div style="font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px;">Filters</div>

            <div style="margin-bottom: 12px;">
                <label style="font-size: 11px; color: var(--text-secondary); display:block; margin-bottom:4px;">Market</label>
                <select id="filterMarket" class="filter-select" onchange="loadSignals()">
                    <option value="">All Markets</option>
                    <option value="forex">Forex</option>
                    <option value="stocks">Stocks</option>
                    <option value="crypto">Crypto</option>
                </select>
            </div>

            <div style="margin-bottom: 12px;">
                <label style="font-size: 11px; color: var(--text-secondary); display:block; margin-bottom:4px;">Status</label>
                <select id="filterStatus" class="filter-select" onchange="loadSignals()">
                    <option value="">All Status</option>
                    <option value="created">Created</option>
                    <option value="active">Active</option>
                    <option value="tracking">Tracking</option>
                    <option value="completed">Completed</option>
                    <option value="expired">Expired</option>
                </select>
            </div>

            <div style="margin-bottom: 12px;">
                <label style="font-size: 11px; color: var(--text-secondary); display:block; margin-bottom:4px;">Limit</label>
                <select id="filterLimit" class="filter-select" onchange="loadSignals()">
                    <option value="25">25</option>
                    <option value="50" selected>50</option>
                    <option value="100">100</option>
                    <option value="200">200</option>
                </select>
            </div>

            <button class="btn btn-secondary" style="width:100%;" onclick="loadSignals()">Apply</button>
        </div>
    </div>

    <!-- Main -->
    <main class="main-content">
        <div class="content-area">
            <div style="display:flex; align-items:center; justify-content:space-between;">
                <h2 style="font-size:18px; font-weight:700;">Signal History</h2>
                <span id="signalCount" style="font-size:12px; color:var(--text-secondary);"></span>
            </div>

            <div class="card" style="padding:0; overflow:hidden;">
                <div id="signalsTable">
                    <div class="empty-state" style="padding:40px;">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">Loading signals...</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Signal Detail Modal -->
<div id="signalModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:24px; max-width:600px; width:90%; max-height:80vh; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h3 style="font-size:16px; font-weight:700;" id="modalTitle">Signal Detail</h3>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:18px;">✕</button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<style>
.filter-select {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 12px;
}
</style>

<script src="/assets/app.js"></script>
<script>
let instruments = [];

async function init() {
    try {
        instruments = await apiGet('/instruments');
    } catch (e) {}
    loadSignals();
}

async function loadSignals() {
    const market = document.getElementById('filterMarket').value;
    const status = document.getElementById('filterStatus').value;
    const limit = document.getElementById('filterLimit').value;

    try {
        const signals = await apiGet('/signals', { market, status, limit });
        document.getElementById('signalCount').textContent = `${signals.length} signals`;
        renderSignalsTable(signals);
    } catch (e) {
        console.error('Failed to load signals:', e);
    }
}

function getInstrumentName(id) {
    const instr = instruments.find(i => i.id === id);
    return instr ? instr.name : `#${id}`;
}

function renderSignalsTable(signals) {
    if (!signals.length) {
        document.getElementById('signalsTable').innerHTML = `
            <div class="empty-state" style="padding:40px;">
                <div class="empty-state-icon">📭</div>
                <div class="empty-state-text">No signals found</div>
            </div>`;
        return;
    }

    const rows = signals.map(s => {
        const name = getInstrumentName(s.instrument_id);
        const instr = instruments.find(i => i.id === s.instrument_id);
        const market = instr ? instr.market : 'unknown';
        const score = parseFloat(s.composite_score);
        const scoreColor = score > 0 ? 'var(--accent-green)' : score < 0 ? 'var(--accent-red)' : 'var(--text-muted)';
        const dirColor = s.direction === 'LONG' ? 'var(--accent-green)' : s.direction === 'SHORT' ? 'var(--accent-red)' : 'var(--text-muted)';

        return `<tr style="cursor:pointer;" onclick="showSignalDetail(${s.id})">
            <td>
                <div style="font-weight:600;">${name}</div>
                <div style="display:flex; gap:6px; margin-top:2px;">${marketTag(market)} <span style="font-size:11px; color:var(--text-secondary);">${s.timeframe}</span></div>
            </td>
            <td><span class="signal-badge ${s.signal_strength}" style="font-size:10px;">${s.signal_strength.replace('_',' ')}</span></td>
            <td style="color:${dirColor}; font-weight:700; font-size:13px;">${s.direction}</td>
            <td style="font-family:monospace; font-size:12px;">${formatPrice(s.entry_price)}</td>
            <td style="font-family:monospace; font-size:12px; color:var(--accent-red);">${formatPrice(s.stop_loss) || '—'}</td>
            <td style="font-family:monospace; font-size:12px; color:var(--accent-green);">${formatPrice(s.take_profit_1) || '—'}</td>
            <td style="color:${scoreColor}; font-weight:600;">${score >= 0 ? '+' : ''}${score.toFixed(1)}</td>
            <td>${statusBadge(s.status)}</td>
            <td style="font-size:11px; color:var(--text-secondary);">${formatDate(s.created_at)}</td>
        </tr>`;
    }).join('');

    document.getElementById('signalsTable').innerHTML = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>Instrument</th>
                    <th>Signal</th>
                    <th>Dir</th>
                    <th>Entry</th>
                    <th>SL</th>
                    <th>TP1</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th>Created</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
}

async function showSignalDetail(id) {
    try {
        const s = await apiGet(`/signals/${id}`);
        const name = getInstrumentName(s.instrument_id);
        const score = parseFloat(s.composite_score);
        const scoreColor = score > 0 ? 'var(--accent-green)' : score < 0 ? 'var(--accent-red)' : 'var(--text-muted)';

        let reasoning = {};
        try { reasoning = JSON.parse(s.reasoning || '{}'); } catch (e) {}

        document.getElementById('modalTitle').textContent = `${name} — ${s.timeframe} Signal #${s.id}`;
        document.getElementById('modalContent').innerHTML = `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;">
                <div class="level-item entry"><div class="level-label">Direction</div><div class="level-value" style="color:${s.direction==='LONG'?'var(--accent-green)':'var(--accent-red)'};">${s.direction}</div></div>
                <div class="level-item"><div class="level-label">Strength</div><div><span class="signal-badge ${s.signal_strength}">${s.signal_strength.replace('_',' ')}</span></div></div>
                <div class="level-item entry"><div class="level-label">Entry Price</div><div class="level-value">${formatPrice(s.entry_price)}</div></div>
                <div class="level-item sl"><div class="level-label">Stop Loss</div><div class="level-value">${formatPrice(s.stop_loss) || '—'}</div></div>
                <div class="level-item tp"><div class="level-label">Take Profit 1</div><div class="level-value">${formatPrice(s.take_profit_1) || '—'}</div></div>
                <div class="level-item tp"><div class="level-label">Take Profit 2</div><div class="level-value">${formatPrice(s.take_profit_2) || '—'}</div></div>
                <div class="level-item"><div class="level-label">R:R Ratio</div><div class="level-value">${s.risk_reward ? '1:'+parseFloat(s.risk_reward).toFixed(2) : '—'}</div></div>
                <div class="level-item"><div class="level-label">Composite Score</div><div class="level-value" style="color:${scoreColor};">${score >= 0 ? '+' : ''}${score.toFixed(2)}</div></div>
            </div>
            <div style="background:var(--bg-tertiary); border-radius:6px; padding:12px; margin-bottom:12px;">
                <div style="font-size:11px; color:var(--text-secondary); margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Score Breakdown</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; font-size:12px;">
                    <div>TA: <strong>${formatScore(s.ta_score)}</strong></div>
                    <div>FA: <strong>${formatScore(s.fa_score)}</strong></div>
                    <div>Sentiment: <strong>${formatScore(s.sentiment_score)}</strong></div>
                    <div>Geo: <strong>${formatScore(s.geo_score)}</strong></div>
                </div>
            </div>
            ${reasoning.factors && reasoning.factors.length ? `
            <div style="background:var(--bg-tertiary); border-radius:6px; padding:12px;">
                <div style="font-size:11px; color:var(--text-secondary); margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">Key Factors</div>
                ${reasoning.factors.map(f => `<div style="font-size:12px; color:var(--text-primary); margin-bottom:4px;">• ${f}</div>`).join('')}
            </div>` : ''}
            <div style="font-size:11px; color:var(--text-secondary); margin-top:12px;">
                Created: ${formatDate(s.created_at)} | Status: ${statusBadge(s.status)} | Horizon: ${s.horizon || '—'}
            </div>`;

        document.getElementById('signalModal').style.display = 'flex';
    } catch (e) {
        console.error('Failed to load signal:', e);
    }
}

function closeModal() {
    document.getElementById('signalModal').style.display = 'none';
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
