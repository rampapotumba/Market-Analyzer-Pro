events {
    worker_connections 1024;
}

http {
    # ── Upstream ───────────────────────────────────────────────────────────────
    upstream fastapi {
        server app:8000;
        keepalive 32;
    }

    # ── Rate Limiting Zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m  rate=5r/s;
    limit_req_zone $binary_remote_addr zone=auth:1m rate=5r/m;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Timeouts & Buffers ─────────────────────────────────────────────────────
    keepalive_timeout 65;
    client_max_body_size 10m;
    proxy_read_timeout 30;
    proxy_connect_timeout 5;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/html;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"                           always;
        add_header X-Content-Type-Options    "nosniff"                              always;
        add_header X-XSS-Protection          "1; mode=block"                        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
        add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
            always;

        # ── CORS ─────────────────────────────────────────────────────────────
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── Health check (no rate limit) ─────────────────────────────────────
        location = /api/v2/health {
            proxy_pass http://fastapi;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ── Prometheus metrics (internal only) ───────────────────────────────
        location = /metrics {
            allow 172.16.0.0/12;   # Docker internal network
            allow 127.0.0.1;
            deny all;
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
        }

        # ── API v1 / v2 ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            limit_req_status 429;

            proxy_pass              http://fastapi;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version      1.1;
            proxy_set_header Connection "";  # keepalive
        }

        # ── OpenAPI docs ──────────────────────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json)$ {
            proxy_pass http://fastapi;
            proxy_set_header Host $host;
        }

        # ── WebSocket v1 / v2 ─────────────────────────────────────────────────
        location /ws/ {
            limit_req zone=ws burst=10 nodelay;

            proxy_pass              http://fastapi;
            proxy_http_version      1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout  86400;
            proxy_send_timeout  86400;
        }

        # ── Frontend / static ─────────────────────────────────────────────────
        location / {
            proxy_pass http://fastapi;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
